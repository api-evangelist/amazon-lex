name: Amazon Lex
description: >-
  Amazon Lex is a fully managed artificial intelligence (AI) service with
  advanced natural language models to design, build, test, and deploy
  conversational interfaces in applications. It provides the deep learning
  functionalities of automatic speech recognition (ASR) for converting speech
  to text, and natural language understanding (NLU) to recognize the intent of
  the text, enabling you to build applications with highly engaging user
  experiences and lifelike conversational interactions.
